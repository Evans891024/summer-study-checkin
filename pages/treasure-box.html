<html lang="zh-CN">

    <meta charset="UTF-8">

    <style id="theme-vars">
:root {
  /* Brand Colors — Rainbow Candy */
  --color-primary: #FF6B9D;
  --color-primary-light: #FF8FB5;
  --color-primary-dark: #E5507F;
  --color-secondary: #A855F7;
  --color-tertiary: #38BDF8;
  --color-accent-yellow: #FBBF24;
  --color-accent-green: #34D399;
  --color-accent-orange: #FB923C;
  --color-accent-pink: #F472B6;
  --color-bg: #FFF7ED;
  --color-bg-warm: #FFF1F5;
  --color-bg-cool: #EFF6FF;
  --color-surface: #FFFFFF;
  --color-surface-hover: #FFF5F7;
  --color-border: #FDE8EF;
  --color-border-soft: #FCE7F3;
  --color-text: #1F2937;
  --color-text-secondary: #6B7280;
  --color-text-tertiary: #9CA3AF;
  --color-text-inverse: #FFFFFF;
  --state-success: #34D399;
  --state-warning: #FBBF24;
  --state-error: #F87171;
  --state-info: #38BDF8;

  /* Gradient candies */
  --gradient-rainbow: linear-gradient(135deg, #FF6B9D, #A855F7, #38BDF8);
  --gradient-candy: linear-gradient(135deg, #F472B6, #FB923C);
  --gradient-sunset: linear-gradient(135deg, #FBBF24, #FF6B9D);
  --gradient-ocean: linear-gradient(135deg, #38BDF8, #34D399);
  --gradient-purple: linear-gradient(135deg, #A855F7, #F472B6);

  /* Typography */
  --font-family-title: "ZCOOL KuaiLe", "Noto Sans SC", system-ui, sans-serif;
  --font-family-body: "Noto Sans SC", system-ui, -apple-system, sans-serif;
  --font-size-display: 2.5rem;
  --font-size-h1: 2rem;
  --font-size-h2: 1.5rem;
  --font-size-h3: 1.25rem;
  --font-size-body: 1rem;
  --font-size-small: 0.875rem;
  --font-size-xs: 0.75rem;
  --font-weight-title: 700;
  --font-weight-body: 400;
  --font-weight-medium: 500;
  --line-height-heading: 1.3;
  --line-height-body: 1.6;

  /* Spacing */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 32px;
  --spacing-2xl: 48px;

  /* Radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* Shadow */
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.04);
  --shadow-card: 0 4px 16px rgba(255,107,157,0.08);
  --shadow-float: 0 8px 24px rgba(168,85,247,0.12);

  /* Brand prefix */
  --brand-prefix: sc;
}

/* Dark mode is not needed for this children's app */

<body>
  <div style="max-width: 768px; margin: 0 auto; min-height: 100vh; padding-bottom: 96px; background: var(--color-bg);">

            <p style="font-size: var(--font-size-xs); margin: 0; color: var(--color-text-secondary);">可能获得: 手账本、彩色笔</p>
          </div>

          <div style="flex-shrink: 0; width: 64px; height: 64px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 1.875rem; background: linear-gradient(135deg, #FBBF24, #F59E0B);" class="glow-btn-sm">
            &#x1F451;
          </div>
          <div style="flex: 1; min-width: 0;">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;">
              <span style="font-weight: var(--font-weight-title); font-size: var(--font-size-body); font-family: var(--font-family-title); color: #92400E;">金宝箱</span>
              <span style="border-radius: var(--radius-full); padding: 2px 12px; font-size: var(--font-size-xs); font-weight: var(--font-weight-title); background: linear-gradient(135deg, #FBBF24, #F59E0B); color: #78350F;">100枚/次</span>
            </div>
            <p style="font-size: var(--font-size-xs); margin: 0; color: var(--color-text-secondary);">可能获得: 公主皇冠、绘本</p>
          </div>
          <button class="glow-btn-sm" style="flex-shrink: 0; border-radius: var(--radius-full); padding: 8px 16px; font-size: var(--font-size-small); font-weight: var(--font-weight-title); color: #fff; border: none; cursor: pointer; background: linear-gradient(135deg, #FBBF24, #FF6B9D); font-family: var(--font-family-title);">
            开启
          </button>
        </div>

      </div>
    </section>

    <!-- ===== Custom Rewards Button ===== -->
    <section style="padding: 8px 20px 4px;">
      <button id="custom-rewards-btn" style="width:100%; border-radius:var(--radius-lg); padding:12px 16px; font-size:var(--font-size-small); font-weight:var(--font-weight-title); color:var(--color-secondary); border:2px dashed var(--color-secondary); cursor:pointer; background:transparent; font-family:var(--font-family-title); display:flex; align-items:center; justify-content:center; gap:6px; transition:background 0.2s;">

    <!-- ===== Encouragement Banner ===== -->

      <div style="border-radius: var(--radius-lg); padding: 16px 20px; text-align: center; position: relative; overflow: hidden; background: var(--gradient-rainbow);">
        <div style="position: relative; z-index: 10;">
          <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 4px;">
            <span class="banner-star" style="font-size: 1.125rem;">&#x2B50;</span>
            <span class="banner-star" style="font-size: var(--font-size-small);">&#x2728;</span>
            <p style="font-size: var(--font-size-small); font-weight: var(--font-weight-title); color: #fff; margin: 0; font-family: var(--font-family-title);">打卡越多，金币越多，奖励越丰富！</p>

    <style>
    body {
      font-family: var(--font-family-body);
      background: var(--color-bg);
      color: var(--color-text);
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Sparkle / Twinkle Animations ===== */
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
      50% { opacity: 1; transform: scale(1) rotate(180deg); }
    }
    @keyframes sparkle-float {
      0% { opacity: 0; transform: translateY(0) scale(0); }
      30% { opacity: 1; transform: translateY(-10px) scale(1); }
      100% { opacity: 0; transform: translateY(-30px) scale(0.5); }
    }
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 15px rgba(251,191,36,0.4), 0 0 30px rgba(255,107,157,0.2); }
      50% { box-shadow: 0 0 25px rgba(251,191,36,0.7), 0 0 50px rgba(255,107,157,0.4), 0 0 70px rgba(168,85,247,0.2); }
    }
    @keyframes glow-pulse-sm {
      0%, 100% { box-shadow: 0 0 8px rgba(251,191,36,0.3); }
      50% { box-shadow: 0 0 18px rgba(251,191,36,0.6), 0 0 30px rgba(255,107,157,0.2); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes coin-spin {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }
    @keyframes star-burst {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.3); opacity: 1; }
    }
    @keyframes badge-shine {
      0% { left: -50%; }
      100% { left: 150%; }
    }

    .sparkle-container {
      position: relative;
    }
    .sparkle-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-accent-yellow);
      animation: sparkle-float 2s ease-in-out infinite;
    }
    .sparkle-dot:nth-child(1) { top: 5%; left: 10%; animation-delay: 0s; }
    .sparkle-dot:nth-child(2) { top: 15%; right: 12%; animation-delay: 0.4s; width: 6px; height: 6px; background: var(--color-primary-light); }
    .sparkle-dot:nth-child(3) { top: 40%; left: 5%; animation-delay: 0.8s; width: 10px; height: 10px; }
    .sparkle-dot:nth-child(4) { top: 30%; right: 8%; animation-delay: 1.2s; background: var(--color-tertiary); }
    .sparkle-dot:nth-child(5) { bottom: 20%; left: 15%; animation-delay: 0.6s; width: 6px; height: 6px; background: var(--color-secondary); }
    .sparkle-dot:nth-child(6) { top: 50%; right: 18%; animation-delay: 1.0s; width: 12px; height: 12px; background: var(--color-accent-yellow); }
    .sparkle-dot:nth-child(7) { bottom: 35%; left: 8%; animation-delay: 1.5s; background: var(--color-primary); }
    .sparkle-dot:nth-child(8) { top: 8%; left: 50%; animation-delay: 0.3s; width: 5px; height: 5px; }

    .sparkle-star {
      position: absolute;
      font-size: 16px;
      animation: sparkle-float 2.5s ease-in-out infinite;
      pointer-events: none;
    }
    .sparkle-star:nth-child(9) { top: 2%; right: 25%; animation-delay: 0.2s; font-size: 14px; }
    .sparkle-star:nth-child(10) { bottom: 10%; right: 5%; animation-delay: 1.3s; font-size: 18px; }
    .sparkle-star:nth-child(11) { top: 60%; left: 2%; animation-delay: 0.9s; font-size: 12px; }

    .glow-btn {
      animation: glow-pulse 2s ease-in-out infinite;
    }
    .glow-btn-sm {
      animation: glow-pulse-sm 2s ease-in-out infinite;
    }

    .float-anim {
      animation: float 3s ease-in-out infinite;
    }

    /* Treasure chest image wrapper */
    .chest-wrapper {
      position: relative;
      display: inline-block;
    }
    .chest-wrapper::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(251,191,36,0.15) 0%, transparent 70%);
      animation: glow-pulse 3s ease-in-out infinite;
      pointer-events: none;
    }

    /* Gold box sparkle overlay */
    .gold-box-card {
      position: relative;
      overflow: hidden;
    }
    .gold-box-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 30%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: skewX(-15deg);
      animation: badge-shine 3s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
    }

    /* Coin badge shimmer */
    .coin-badge {
      position: relative;
      overflow: hidden;
    }
    .coin-badge::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 30%;
      height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      transform: skewX(-15deg);
      animation: badge-shine 2.5s ease-in-out infinite;
      pointer-events: none;
    }

    /* Rainbow banner star decorations */
    .banner-star {
      animation: star-burst 2s ease-in-out infinite;
    }
    .banner-star:nth-child(2) { animation-delay: 0.3s; }
    .banner-star:nth-child(3) { animation-delay: 0.7s; }
    .banner-star:nth-child(4) { animation-delay: 1.1s; }

    /* === Tab Bar (unified) === */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 768px;
      width: 100%;
      z-index: 50;
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
    }
    .tab-bar-inner {
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 8px 0;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 12px;
      font-size: 10px;
      font-weight: var(--font-weight-medium);
      color: var(--color-text-tertiary);
      text-decoration: none;
      border-radius: 8px;
      transition: color 0.2s;
    }
    .tab-item.active {
      color: var(--color-primary);
    }
    .tab-item .tab-emoji {
      font-size: 1.25rem;
      line-height: 1;
    }
  </style>

<style>
@keyframes celebrateBounce {
  0% { transform: scale(1); }
  30% { transform: scale(1.3); }
  50% { transform: scale(0.9); }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes chestShake {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  10% { transform: translate(-4px, -2px) rotate(-3deg); }
  20% { transform: translate(4px, 2px) rotate(3deg); }
  30% { transform: translate(-3px, 3px) rotate(-2deg); }
  40% { transform: translate(3px, -3px) rotate(2deg); }
  50% { transform: translate(-2px, 2px) rotate(-4deg); }
  60% { transform: translate(2px, -2px) rotate(4deg); }
  70% { transform: translate(-4px, 1px) rotate(-2deg); }
  80% { transform: translate(4px, -1px) rotate(2deg); }
  90% { transform: translate(-2px, -3px) rotate(-3deg); }
}
@keyframes particleFloat {
  0% { opacity: 0; transform: translate(0, 0) scale(0); }
  20% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: translate(var(--px, 0), var(--py, -60px)) scale(0.5); }
}
@keyframes revealScale {
  0% { transform: scale(0) rotate(-15deg); opacity: 0; }
  50% { transform: scale(1.2) rotate(5deg); opacity: 1; }
  70% { transform: scale(0.95) rotate(-2deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes revealGlow {
  0% { box-shadow: 0 0 0 rgba(251,191,36,0); }
  50% { box-shadow: 0 0 40px rgba(251,191,36,0.6), 0 0 80px rgba(255,107,157,0.3), 0 0 120px rgba(168,85,247,0.15); }
  100% { box-shadow: 0 0 20px rgba(251,191,36,0.3), 0 0 40px rgba(255,107,157,0.15); }
}
.opening-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
.opening-overlay.active {
  display: flex;
}
.opening-chest {
  font-size: 5rem;
  animation: chestShake 0.4s ease-in-out infinite;
  position: relative;
  z-index: 10;
}
.opening-particle {
  position: absolute;
  font-size: 1.5rem;
  animation: particleFloat 1.2s ease-out forwards;
  pointer-events: none;
  z-index: 5;
}
.opening-reveal {
  font-size: 5rem;
  animation: revealScale 0.8s ease-out forwards, revealGlow 1s ease-out 0.3s forwards;
  display: none;
  border-radius: 24px;
  padding: 16px;
}
.opening-reveal.active {
  display: block;
}
.opening-chest.hidden {
  display: none;
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var navMap = {
    'nav-home': 'home.html',
    'nav-daily-checkin': 'daily-checkin.html',
    'nav-treasure-box': 'treasure-box.html',
    'nav-my-rewards': 'my-rewards.html'
  };
  document.querySelectorAll('[data-dom-id]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.preventDefault();
      var target = navMap[el.getAttribute('data-dom-id')];
      if (target) window.location.href = target;
    });
  });

  var nick = getNickname();
  function sKey(key) { return nick ? key + '_' + nick : key; }

  // One-time migration: clear old scoped data
  try {
    if (!localStorage.getItem('app_v3_migrated')) {
      var prefixesToRemove = ['claimed_achievements_', 'used_prizes_', 'unlocked_achievements_',
        'treasure_rewards_', 'treasure_emojis_', 'daily_free_date_', 'checkin_calendar_data_',
        'sc_achievements_claimed_', 'sc_prizes_used_'];
      Object.keys(localStorage).forEach(function(k) {
        for (var p = 0; p < prefixesToRemove.length; p++) {
          if (k.indexOf(prefixesToRemove[p]) === 0) {
            localStorage.removeItem(k);
            break;
          }
        }
      });
      localStorage.setItem('app_v3_migrated', '1');
    }
  } catch(e) {}

  var coins = 0; // Will be loaded from Supabase
  var userDataLoaded = false;
  var serverDailyFreeDate = null;

  // Default reward pools
  var defaultRewards = {
    bronze: ['可爱贴纸', '彩色铅笔', '小橡皮', '书签'],
    silver: ['手账本', '彩色笔套装', '阅读灯', '笔记本'],
    gold: ['公主皇冠发卡', '精美绘本', '水晶球', '魔法棒']
  };
  var defaultEmojis = {
    bronze: ['🎀', '✏️', '🧸', '🔖'],
    silver: ['📖', '🖌️', '💡', '📓'],
    gold: ['👑', '📚', '🔮', '✨']
  };

  // Load rewards from localStorage or use defaults
  function loadRewards() {
    try {
      var savedRewards = localStorage.getItem(sKey('treasure_rewards'));
      var savedEmojis = localStorage.getItem(sKey('treasure_emojis'));
      if (savedRewards) return { rewards: JSON.parse(savedRewards), emojis: savedEmojis ? JSON.parse(savedEmojis) : defaultEmojis };
    } catch(e) {}
    return null;
  }
  function saveRewards() {
    try {
      localStorage.setItem(sKey('treasure_rewards'), JSON.stringify(rewards));
      localStorage.setItem(sKey('treasure_emojis'), JSON.stringify(emojis));
    } catch(e) {}
    // Also save to Supabase
    try {
      DB.updateUser({
        custom_rewards: {
          bronze: { names: rewards.bronze, emojis: emojis.bronze },
          silver: { names: rewards.silver, emojis: emojis.silver },
          gold: { names: rewards.gold, emojis: emojis.gold }
        }
      });
    } catch(e) {}
  }

  // Priority: localStorage > defaults
  var loaded = loadRewards();
  var rewards = loaded ? loaded.rewards : JSON.parse(JSON.stringify(defaultRewards));
  var emojis = loaded ? loaded.emojis : JSON.parse(JSON.stringify(defaultEmojis));

  // Initialize from Supabase (wrapped in ensureLogin)
  ensureLogin(function(nickname) {
    try {
      DB.initUser().then(function(user) {
        if (user) {
          coins = user.total_coins || 0;
          // Load custom rewards from user data
          if (user.custom_rewards) {
            try {
              var cr = typeof user.custom_rewards === 'string' ? JSON.parse(user.custom_rewards) : user.custom_rewards;
              if (cr && cr.bronze) {
                rewards.bronze = cr.bronze.names || rewards.bronze;
                emojis.bronze = cr.bronze.emojis || emojis.bronze;
              }
              if (cr && cr.silver) {
                rewards.silver = cr.silver.names || rewards.silver;
                emojis.silver = cr.silver.emojis || emojis.silver;
              }
              if (cr && cr.gold) {
                rewards.gold = cr.gold.names || rewards.gold;
                emojis.gold = cr.gold.emojis || emojis.gold;
              }
            } catch(e) {}
          }
          // Load daily free date from server
          if (user.daily_free_date) {
            serverDailyFreeDate = user.daily_free_date;
          }
          userDataLoaded = true;
          updateCoinDisplay();
          checkDailyFree();
        }
      }).catch(function(e) { console.warn('Supabase init failed:', e); });
    } catch(e) {}
  });

  function updateCoinDisplay() {
    var badges = document.querySelectorAll('.coin-badge');
    badges.forEach(function(b) {
      b.innerHTML = '余额: ' + coins + '枚 <span style="font-size:1.125rem;">&#x1F4B0;</span>';
    });

  }

  function openBox(type, cost) {
    if (coins < cost) {
      document.getElementById('not-enough-modal').style.display = 'flex';
      return;
    }
    coins -= cost;
    updateCoinDisplay();
    try { DB.updateUser({ total_coins: coins }); } catch(e) {}
    var pool = rewards[type] || rewards.bronze;
    var emojiPool = emojis[type] || emojis.bronze;
    var idx = Math.floor(Math.random() * pool.length);
    var reward = pool[idx];
    var emoji = emojiPool[idx];

    // Phase 1: Opening animation with shaking chest and particles
    var overlay = document.getElementById('opening-overlay');
    var chest = document.getElementById('opening-chest');
    var reveal = document.getElementById('opening-reveal');
    chest.className = 'opening-chest';
    reveal.className = 'opening-reveal';
    chest.textContent = type === 'gold' ? '&#x1F451;' : type === 'silver' ? '&#x1F381;' : '&#x1F4E6;';
    chest.innerHTML = chest.textContent;
    overlay.classList.add('active');

    // Spawn particles continuously during shake phase
    var particleInterval = setInterval(function() {
      if (!overlay.classList.contains('active')) { clearInterval(particleInterval); return; }
      var sparkles = ['\u2728', '\uD83D\uDCAB', '\u2B50', '\uD83C\uDF1F', '\uD83C\uDF08'];
      var p = document.createElement('span');
      p.className = 'opening-particle';
      p.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
      var angle = Math.random() * Math.PI * 2;
      var dist = 60 + Math.random() * 80;
      p.style.left = 'calc(50% + ' + (Math.random() * 60 - 30) + 'px)';
      p.style.top = 'calc(50% + ' + (Math.random() * 60 - 30) + 'px)';
      p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
      p.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
      overlay.appendChild(p);
      setTimeout(function() { if (p.parentNode) p.parentNode.removeChild(p); }, 1500);
    }, 200);

    // Phase 2: After 1.5s, show reveal
    setTimeout(function() {
      clearInterval(particleInterval);
      chest.classList.add('hidden');
      reveal.textContent = emoji;
      reveal.innerHTML = emoji;
      reveal.className = 'opening-reveal active';
    }, 1500);

    // Phase 3: After 2.5s, hide overlay and show result modal
    setTimeout(function() {
      overlay.classList.remove('active');
      document.getElementById('modal-animation').textContent = emoji;
      document.getElementById('modal-title').textContent = '恭喜获得!';
      document.getElementById('modal-reward').textContent = reward;
      document.getElementById('modal-coin-change').textContent = '-' + cost + '枚 金币';
      document.getElementById('treasure-modal').style.display = 'flex';

      // Save this won prize
      try {
        var won = JSON.parse(localStorage.getItem(sKey('won_prizes')) || '[]');
        won.push({ name: reward, emoji: emoji, type: type, date: new Date().toISOString().split('T')[0] });
        localStorage.setItem(sKey('won_prizes'), JSON.stringify(won));
        // Track box opens count
        var opens = parseInt(localStorage.getItem(sKey('box_opens')) || '0') + 1;
        localStorage.setItem(sKey('box_opens'), opens.toString());
        // Sync to Supabase
        DB.updateUser({ won_prizes: won, box_opens: opens });
      } catch(e) {}
    }, 2500);
  }

  // Daily free box logic
  var dailyFreeBtn = document.getElementById('daily-free-btn');
  var dailyFreeBadge = document.getElementById('daily-free-badge');
  var dailyFreeHint = document.getElementById('daily-free-hint');
  function checkDailyFree() {
    try {
      var lastDate = localStorage.getItem(sKey('daily_free_date')) || serverDailyFreeDate;
      var today = new Date().toISOString().split('T')[0];
      if (lastDate === today) {
        dailyFreeBtn.textContent = '明天再来';
        dailyFreeBtn.style.background = '#D1D5DB';
        dailyFreeBtn.style.cursor = 'not-allowed';
        dailyFreeBadge.textContent = '今日已开';
        dailyFreeBadge.style.background = 'linear-gradient(135deg, #D1D5DB, #9CA3AF)';
        dailyFreeHint.textContent = '明天再来领取免费宝箱吧！';
        return false;
      }
    } catch(e) {}
    return true;
  }
  checkDailyFree();
  if (dailyFreeBtn) {
    dailyFreeBtn.addEventListener('click', function(e) {
      e.preventDefault();
      if (!checkDailyFree()) return;
      // Weighted random coin reward (1-10 coins, higher = rarer)
      var coinPool = [
        { coins: 1,  weight: 40 },
        { coins: 2,  weight: 25 },
        { coins: 3,  weight: 15 },
        { coins: 5,  weight: 10 },
        { coins: 8,  weight: 7 },
        { coins: 10, weight: 3 }
      ];
      var totalWeight = 0;
      coinPool.forEach(function(c) { totalWeight += c.weight; });
      var rand = Math.random() * totalWeight;
      var chosen = coinPool[0];
      for (var i = 0; i < coinPool.length; i++) {
        rand -= coinPool[i].weight;
        if (rand <= 0) { chosen = coinPool[i]; break; }
      }
      var coinReward = chosen.coins;
      coins += coinReward;
      updateCoinDisplay();
      try { DB.updateUser({ total_coins: coins }); } catch(e) {}

      var overlay = document.getElementById('opening-overlay');
      var chest = document.getElementById('opening-chest');
      var reveal = document.getElementById('opening-reveal');
      chest.className = 'opening-chest';
      reveal.className = 'opening-reveal';
      chest.innerHTML = '&#x2728;';
      overlay.classList.add('active');

      var particleInterval = setInterval(function() {
        if (!overlay.classList.contains('active')) { clearInterval(particleInterval); return; }
        var sparkles = ['\u2728', '\uD83D\uDCAB', '\u2B50', '\uD83C\uDF1F', '\uD83C\uDF08'];
        var p = document.createElement('span');
        p.className = 'opening-particle';
        p.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
        var angle = Math.random() * Math.PI * 2;
        var dist = 60 + Math.random() * 80;
        p.style.left = 'calc(50% + ' + (Math.random() * 60 - 30) + 'px)';
        p.style.top = 'calc(50% + ' + (Math.random() * 60 - 30) + 'px)';
        p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
        p.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
        overlay.appendChild(p);
        setTimeout(function() { if (p.parentNode) p.parentNode.removeChild(p); }, 1500);
      }, 200);

      setTimeout(function() {
        clearInterval(particleInterval);
        chest.classList.add('hidden');
        var coinEmoji = coinReward >= 8 ? '\uD83D\uDC51' : coinReward >= 5 ? '\u{1F31F}' : '\u{1F4B0}';
        reveal.innerHTML = coinEmoji;
        reveal.className = 'opening-reveal active';
      }, 1500);

      setTimeout(function() {
        overlay.classList.remove('active');
        var coinEmoji2 = coinReward >= 8 ? '\uD83D\uDC51' : coinReward >= 5 ? '\u{1F31F}' : '\u{1F4B0}';
        document.getElementById('modal-animation').textContent = coinEmoji2;
        document.getElementById('modal-title').textContent = '免费宝箱!';
        document.getElementById('modal-reward').textContent = coinReward + '枚金币';
        document.getElementById('modal-coin-change').textContent = '余额 +' + coinReward;
        document.getElementById('treasure-modal').style.display = 'flex';
        // Track daily box opens
        try {
          var opens = parseInt(localStorage.getItem(sKey('box_opens')) || '0') + 1;
          localStorage.setItem(sKey('box_opens'), opens.toString());
          DB.updateUser({ box_opens: opens });
        } catch(e) {}
        // Mark today as used
        try {
          localStorage.setItem(sKey('daily_free_date'), new Date().toISOString().split('T')[0]);
          try { DB.updateUser({ daily_free_date: new Date().toISOString().split('T')[0] }); } catch(e) {}
          checkDailyFree();
        } catch(e) {}
      }, 2500);
    });
  }

  // Box-specific "开启" buttons
  var allBtns = document.querySelectorAll('button');
  allBtns.forEach(function(btn) {
    var text = btn.textContent.trim();
    if (text === '开启') {
      var card = btn.closest('div[class]') || btn.parentElement;
      var priceText = card ? card.textContent : '';
      if (priceText.indexOf('铜') !== -1) {
        btn.addEventListener('click', function(e) { e.preventDefault(); openBox('bronze', 30); });
      } else if (priceText.indexOf('银') !== -1) {
        btn.addEventListener('click', function(e) { e.preventDefault(); openBox('silver', 60); });
      } else if (priceText.indexOf('金') !== -1) {
        btn.addEventListener('click', function(e) { e.preventDefault(); openBox('gold', 100); });
      }
    }
  });

  // Modal close buttons
  var closeBtn = document.getElementById('modal-close');
  if (closeBtn) closeBtn.addEventListener('click', function() {
    document.getElementById('treasure-modal').style.display = 'none';
  });
  var notEnoughClose = document.getElementById('not-enough-close');
  if (notEnoughClose) notEnoughClose.addEventListener('click', function() {
    document.getElementById('not-enough-modal').style.display = 'none';
  });

  // Close modals on background click
  ['treasure-modal', 'not-enough-modal', 'custom-rewards-modal'].forEach(function(id) {
    document.getElementById(id).addEventListener('click', function(e) {
      if (e.target === this) this.style.display = 'none';
    });
  });

  // ===== Custom Rewards Modal Logic =====
  var currentTab = 'bronze';
  var tabStyles = {
    bronze: { activeBg: 'linear-gradient(135deg, #FED7AA, #FDBA74)', inactiveBg: '#fff', border: '#FDBA74', color: '#92400E' },
    silver: { activeBg: 'linear-gradient(135deg, #BFDBFE, #93C5FD)', inactiveBg: '#fff', border: '#BFDBFE', color: '#1E40AF' },
    gold:   { activeBg: 'linear-gradient(135deg, #FBBF24, #F59E0B)', inactiveBg: '#fff', border: '#FBBF24', color: '#78350F' }
  };

  function renderCustomRewardsList() {
    var list = document.getElementById('custom-rewards-list');
    var items = rewards[currentTab] || [];
    var emojiItems = emojis[currentTab] || [];
    list.innerHTML = '';
    if (items.length === 0) {
      list.innerHTML = '<p style="text-align:center; color:var(--color-text-tertiary); font-size:var(--font-size-small); padding:20px 0;">暂无奖励，快添加一些吧！</p>';
      return;
    }
    items.forEach(function(item, i) {
      var row = document.createElement('div');
      row.style.cssText = 'display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--color-bg); border-radius:var(--radius-md); border:1px solid var(--color-border);';
      var emojiSpan = document.createElement('span');
      emojiSpan.style.cssText = 'font-size:1.25rem; flex-shrink:0;';
      emojiSpan.textContent = emojiItems[i] || '\u{1F381}';
      var nameSpan = document.createElement('span');
      nameSpan.style.cssText = 'flex:1; font-size:var(--font-size-small); font-family:var(--font-family-body); color:var(--color-text);';
      nameSpan.textContent = item;
      var delBtn = document.createElement('button');
      delBtn.style.cssText = 'flex-shrink:0; background:none; border:none; font-size:1.125rem; cursor:pointer; color:var(--state-error); line-height:1; padding:2px;';
      delBtn.textContent = '\u{2715}';
      delBtn.setAttribute('data-index', i);
      delBtn.addEventListener('click', function() {
        var idx = parseInt(this.getAttribute('data-index'));
        rewards[currentTab].splice(idx, 1);
        emojis[currentTab].splice(idx, 1);
        saveRewards();
        renderCustomRewardsList();
      });
      row.appendChild(emojiSpan);
      row.appendChild(nameSpan);
      row.appendChild(delBtn);
      list.appendChild(row);
    });
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.custom-tab').forEach(function(t) {
      var tTab = t.getAttribute('data-tab');
      var s = tabStyles[tTab];
      if (tTab === tab) {
        t.style.background = s.activeBg;
        t.style.color = s.color;
      } else {
        t.style.background = s.inactiveBg;
        t.style.color = s.color;
      }
    });
    renderCustomRewardsList();
  }

  // Open custom rewards modal (parent password required)
  var parentPwd = localStorage.getItem('parent_pwd') || '8888';
  var customBtn = document.getElementById('custom-rewards-btn');
  if (customBtn) customBtn.addEventListener('click', function() {
    // Ask for parent password
    var pwdModal = document.createElement('div');
    pwdModal.style.cssText = 'position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;';
    var pwdCard = document.createElement('div');
    pwdCard.style.cssText = 'background:#fff;border-radius:20px;padding:28px 24px;width:300px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15);font-family:var(--font-family-body);';
    pwdCard.innerHTML = '<div style="font-size:2.5rem;margin-bottom:8px;">&#x1F512;</div>'
      + '<h3 style="margin:0 0 6px;font-size:1.1rem;font-family:var(--font-family-title);color:var(--color-text);">家长验证</h3>'
      + '<p style="margin:0 0 16px;font-size:var(--font-size-small);color:var(--color-text-tertiary);">请输入家长密码</p>'
      + '<input id="parent-pwd-input" type="password" maxlength="8" placeholder="输入密码" style="width:100%;padding:12px 16px;border:2px solid var(--color-border);border-radius:12px;font-size:1rem;outline:none;text-align:center;font-family:inherit;box-sizing:border-box;">'
      + '<p id="parent-pwd-error" style="margin:8px 0 0;font-size:var(--font-size-xs);color:var(--state-error);display:none;">密码错误</p>'
      + '<div style="display:flex;gap:8px;margin-top:16px;">'
      + '<button id="parent-pwd-cancel" style="flex:1;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-md);background:#fff;cursor:pointer;font-family:var(--font-family-body);font-size:var(--font-size-body);color:var(--color-text-secondary);">取消</button>'
      + '<button id="parent-pwd-ok" style="flex:1;padding:12px;border:none;border-radius:var(--radius-md);background:var(--gradient-candy);color:#fff;cursor:pointer;font-family:var(--font-family-title);font-size:var(--font-size-body);">确认</button>'
      + '</div>';
    pwdModal.appendChild(pwdCard);
    document.body.appendChild(pwdModal);

    var pwdInput = document.getElementById('parent-pwd-input');
    setTimeout(function() { pwdInput.focus(); }, 100);

    function closePwd() { pwdModal.remove(); }
    document.getElementById('parent-pwd-cancel').addEventListener('click', closePwd);
    pwdModal.addEventListener('click', function(e) { if (e.target === pwdModal) closePwd(); });

    document.getElementById('parent-pwd-ok').addEventListener('click', function() {
      var input = pwdInput.value;
      if (input === parentPwd) {
        closePwd();
        switchTab(currentTab);
        document.getElementById('custom-rewards-modal').style.display = 'flex';
      } else {
        document.getElementById('parent-pwd-error').style.display = 'block';
        pwdInput.style.borderColor = 'var(--state-error)';
        pwdInput.value = '';
        pwdInput.focus();
      }
    });
    pwdInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('parent-pwd-ok').click();
    });
  });
  // Close custom rewards modal
  var customClose = document.getElementById('custom-rewards-close');
  if (customClose) customClose.addEventListener('click', function() {
    document.getElementById('custom-rewards-modal').style.display = 'none';
  });
  // Tab switching
  document.querySelectorAll('.custom-tab').forEach(function(t) {
    t.addEventListener('click', function() {
      switchTab(this.getAttribute('data-tab'));
    });
  });
  // Add reward
  var addBtn = document.getElementById('custom-reward-add');
  var rewardInput = document.getElementById('custom-reward-input');
  var emojiSelect = document.getElementById('custom-reward-emoji');
  if (addBtn) addBtn.addEventListener('click', function() {
    var name = rewardInput.value.trim();
    if (!name) return;
    if (!rewards[currentTab]) rewards[currentTab] = [];
    if (!emojis[currentTab]) emojis[currentTab] = [];
    rewards[currentTab].push(name);
    emojis[currentTab].push(emojiSelect.value);
    saveRewards();
    rewardInput.value = '';
    renderCustomRewardsList();
  });
  // Allow Enter key to add
  if (rewardInput) rewardInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); addBtn.click(); }
  });
  // Reset to defaults
  var resetBtn = document.getElementById('custom-rewards-reset');
  if (resetBtn) resetBtn.addEventListener('click', function() {
    rewards = JSON.parse(JSON.stringify(defaultRewards));
    emojis = JSON.parse(JSON.stringify(defaultEmojis));
    saveRewards();
    renderCustomRewardsList();
  });

  // User action bar
  var nickLabel = document.getElementById('user-nickname-label');
  if (nickLabel) nickLabel.textContent = nick;
  var userBar = document.getElementById('user-action-bar');
  if (userBar) userBar.style.display = 'block';
  document.getElementById('user-switch-btn').addEventListener('click', function() {
    if (confirm('确定要切换用户吗？当前数据已自动保存。')) {
      logout();
      ensureLogin(function() { location.reload(); });
    }
  });
  document.getElementById('user-cache-btn').addEventListener('click', function() {
    if (!confirm('\u26A0\uFE0F 警告：此操作将清空数据库中你的全部数据（打卡记录、金币、成就、奖品等），并且不可恢复！\n\n确定要继续吗？')) return;
    if (!confirm('真的要全部清空吗？数据删除后无法找回！')) return;
    var btn = this;
    btn.disabled = true;
    btn.textContent = '清除中...';
    DB.clearUserData().then(function(success) {
      if (success) {
        location.reload();
      } else {
        alert('清除失败，请重试');
        btn.disabled = false;
        btn.textContent = '清除缓存';
      }
    });
  });
});
</script>
</body>
</html>
