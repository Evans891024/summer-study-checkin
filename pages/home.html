<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暑期学习打卡乐园</title>
    <style id="theme-vars">
:root {
  /* Brand Colors — Rainbow Candy */
  --color-primary: #FF6B9D;
  --color-primary-light: #FF8FB5;
  --color-primary-dark: #E5507F;
  --color-secondary: #A855F7;
  --color-tertiary: #38BDF8;
  --color-accent-yellow: #FBBF24;
  --color-accent-green: #34D399;
  --color-accent-orange: #FB923C;
  --color-accent-pink: #F472B6;
  --color-bg: #FFF7ED;
  --color-bg-warm: #FFF1F5;
  --color-bg-cool: #EFF6FF;
  --color-surface: #FFFFFF;
  --color-surface-hover: #FFF5F7;
  --color-border: #FDE8EF;
  --color-border-soft: #FCE7F3;
  --color-text: #1F2937;
  --color-text-secondary: #6B7280;
  --color-text-tertiary: #9CA3AF;
  --color-text-inverse: #FFFFFF;
  --state-success: #34D399;
  --state-warning: #FBBF24;
  --state-error: #F87171;
  --state-info: #38BDF8;

  /* Gradient candies */
  --gradient-rainbow: linear-gradient(135deg, #FF6B9D, #A855F7, #38BDF8);
  --gradient-candy: linear-gradient(135deg, #F472B6, #FB923C);
  --gradient-sunset: linear-gradient(135deg, #FBBF24, #FF6B9D);
  --gradient-ocean: linear-gradient(135deg, #38BDF8, #34D399);
  --gradient-purple: linear-gradient(135deg, #A855F7, #F472B6);

  /* Typography */
  --font-family-title: "ZCOOL KuaiLe", "Noto Sans SC", system-ui, sans-serif;
  --font-family-body: "Noto Sans SC", system-ui, -apple-system, sans-serif;
  --font-size-display: 2.5rem;
  --font-size-h1: 2rem;
  --font-size-h2: 1.5rem;
  --font-size-h3: 1.25rem;
  --font-size-body: 1rem;
  --font-size-small: 0.875rem;
  --font-size-xs: 0.75rem;
  --font-weight-title: 700;
  --font-weight-body: 400;
  --font-weight-medium: 500;
  --line-height-heading: 1.3;
  --line-height-body: 1.6;

  /* Spacing */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 32px;
  --spacing-2xl: 48px;

  /* Radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* Shadow */
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.04);
  --shadow-card: 0 4px 16px rgba(255,107,157,0.08);
  --shadow-float: 0 8px 24px rgba(168,85,247,0.12);

  /* Brand prefix */
  --brand-prefix: sc;
}

/* Dark mode is not needed for this children's app */

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="../db.js"></script>
    <style>
        /* === Reset & Base === */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: var(--color-bg);
            font-family: var(--font-family-body);
            color: var(--color-text);
            line-height: var(--line-height-body);
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            border: none;
            background: none;
            font-family: inherit;
        }
        img {
            display: block;
        }

        /* === Mobile Container === */
        .mobile-container {
            max-width: 768px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* === Page Content === */
        .page-content {
            padding-bottom: 80px;
        }

        /* === Section Spacing === */
        .hero-section {
            padding: var(--spacing-md) var(--spacing-md) var(--spacing-sm);
        }
        .hero-image-wrap {
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }
        .hero-image-wrap img {
            width: 100%;
            height: 176px;
            object-fit: cover;
        }
        .hero-text {
            text-align: center;
            margin-top: 12px;
        }
        .hero-title {
            font-size: var(--font-size-h1);
            font-weight: var(--font-weight-title);
            line-height: var(--line-height-heading);
            font-family: var(--font-family-title);
            color: var(--color-primary);
        }
        .hero-subtitle {
            margin-top: var(--spacing-sm);
            font-size: var(--font-size-small);
            color: var(--color-text-secondary);
        }
        .hero-greeting {
            margin-top: var(--spacing-sm);
            font-size: 1.125rem;
            font-family: var(--font-family-title);
            color: var(--color-secondary);
        }

        /* === Stats Cards === */
        .stats-section {
            padding: 0 var(--spacing-md);
            margin-top: var(--spacing-md);
        }
        .stats-row {
            display: flex;
            gap: 12px;
        }
        .stat-card {
            flex: 1;
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            text-align: center;
            color: var(--color-text-inverse);
        }
        .stat-card .emoji {
            font-size: 1.5rem;
            margin-bottom: var(--spacing-sm);
        }
        .stat-card .label {
            font-size: 0.75rem;
            opacity: 0.9;
        }
        .stat-card .value {
            font-size: 1.25rem;
            font-weight: var(--font-weight-title);
            margin-top: 2px;
        }

        /* === Quick Action Grid === */
        .actions-section {
            padding: 0 var(--spacing-md);
            margin-top: 20px;
        }
        .actions-title {
            font-size: 1rem;
            font-weight: var(--font-weight-title);
            margin-bottom: 12px;
            font-family: var(--font-family-title);
            color: var(--color-text);
        }
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        .action-btn {
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-sm);
            color: var(--color-text-inverse);
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        .action-btn:active {
            transform: scale(0.95);
        }
        .action-btn .emoji {
            font-size: 1.875rem;
        }
        .action-btn .btn-text {
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-title);
        }

        /* === Motivational Quote === */
        .quote-section {
            padding: 0 var(--spacing-md);
            margin-top: 20px;
        }
        .quote-card {
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            position: relative;
            overflow: hidden;
            background: var(--color-surface);
            box-shadow: var(--shadow-card);
            border: 2px solid var(--color-border-soft);
        }
        .quote-sparkle {
            position: absolute;
        }
        .sparkle-1 { top: 8px; right: 12px; font-size: 1.125rem; }
        .sparkle-2 { top: 8px; right: 40px; font-size: var(--font-size-small); }
        .sparkle-3 { bottom: 8px; left: 12px; font-size: var(--font-size-small); }
        .sparkle-4 { bottom: 12px; right: 16px; font-size: 1.125rem; }
        .sparkle-5 { top: 24px; left: 16px; font-size: var(--font-size-xs); }
        .quote-content {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .quote-emoji {
            font-size: 1.875rem;
        }
        .quote-label {
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-title);
            margin-bottom: var(--spacing-sm);
            color: var(--color-secondary);
            font-family: var(--font-family-title);
        }
        .quote-text {
            font-size: var(--font-size-small);
            line-height: 1.625;
            color: var(--color-text-secondary);
        }

        /* === Bottom spacer === */
        .bottom-spacer {
            height: var(--spacing-md);
        }

        /* === Tab Bar === */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            max-width: 768px;
            width: 100%;
            z-index: 50;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
        }
        .tab-bar-inner {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: var(--spacing-sm) 0;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: var(--spacing-sm) 12px;
            font-size: 10px;
            font-weight: var(--font-weight-medium);
        }
        .tab-item .tab-emoji {
            font-size: 1.25rem;
        }

        /* === Animations === */
        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        @keyframes floatUp {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .animate-bounce-gentle {
            animation: gentleBounce 2s ease-in-out infinite;
        }
        .animate-twinkle {
            animation: twinkle 1.5s ease-in-out infinite;
        }
        .animate-twinkle-delay {
            animation: twinkle 1.5s ease-in-out 0.5s infinite;
        }
        .animate-twinkle-delay2 {
            animation: twinkle 1.5s ease-in-out 1s infinite;
        }
        .animate-float {
            animation: floatUp 3s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <main class="page-content">
            <!-- Hero Section -->
            <section class="hero-section">
                <div class="hero-image-wrap">
                    <img src="../assets/hero-candy-land.jpg" alt="Candy Land">
                </div>
                <div class="hero-text">
                    <h1 class="hero-title">暑期学习打卡乐园</h1>
                    <p class="hero-subtitle">和小伙伴一起快乐学习吧！</p>
                    <p id="greeting-text" class="hero-greeting">早上好，小公主！</p>
                </div>
            </section>

            <!-- Stats Cards Row -->
            <section class="stats-section">
                <div class="stats-row">
                    <!-- Card 1: Streak -->
                    <div class="stat-card" style="background: linear-gradient(135deg, #FF6B9D, #FF8FB5); box-shadow: var(--shadow-card);">
                        <div class="emoji">🔥</div>
                        <div class="label">连续打卡</div>
                        <div class="value">7天</div>
                    </div>
                    <!-- Card 2: Today's Coins -->
                    <div class="stat-card" style="background: linear-gradient(135deg, #A855F7, #C084FC); box-shadow: var(--shadow-card);">
                        <div class="emoji">💰</div>
                        <div class="label">今日金币</div>
                        <div class="value">15枚</div>
                    </div>
                    <!-- Card 3: Total Coins -->
                    <div id="stat-total-coins" class="stat-card" style="background: linear-gradient(135deg, #38BDF8, #7DD3FC); box-shadow: var(--shadow-card);">
                        <div class="emoji">💰</div>
                        <div class="label">总金币</div>
                        <div class="value">128枚</div>
                    </div>
                </div>
            </section>

            <!-- Quick Action Buttons (3-column Grid) -->
            <section class="actions-section">
                <h2 class="actions-title">快捷入口</h2>
                <div class="actions-grid">
                    <!-- CTA: Today's Check-in -->
                    <button data-dom-id="cta-start-today"
                        class="action-btn animate-bounce-gentle"
                        style="background: var(--gradient-rainbow); box-shadow: var(--shadow-float);">
                        <span class="emoji">📋</span>
                        <span class="btn-text">今日打卡</span>
                    </button>
                    <!-- Treasure Box -->
                    <button data-dom-id="nav-treasure-box"
                        class="action-btn"
                        style="background: var(--gradient-purple); box-shadow: var(--shadow-card);">
                        <span class="emoji">🎁</span>
                        <span class="btn-text">开宝箱</span>
                    </button>
                    <!-- My Rewards -->
                    <button data-dom-id="nav-my-rewards"
                        class="action-btn"
                        style="background: var(--gradient-ocean); box-shadow: var(--shadow-card);">
                        <span class="emoji">🏆</span>
                        <span class="btn-text">我的奖励</span>
                    </button>
                </div>
            </section>

            <!-- Motivational Section -->
            <section class="quote-section">
                <div class="quote-card">
                    <!-- Decorative sparkles -->
                    <span class="quote-sparkle sparkle-1 animate-twinkle">✨</span>
                    <span class="quote-sparkle sparkle-2 animate-twinkle-delay">⭐</span>
                    <span class="quote-sparkle sparkle-3 animate-twinkle-delay2">⭐</span>
                    <span class="quote-sparkle sparkle-4 animate-twinkle">✨</span>
                    <span class="quote-sparkle sparkle-5 animate-twinkle-delay">💫</span>

                    <div class="quote-content">
                        <span class="quote-emoji animate-float">🌸</span>
                        <div>
                            <h3 class="quote-label">今日名言</h3>
                            <p class="quote-text">
                                每坚持一天，你就离梦想更近一步！
                            </p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Spacer for bottom padding -->
            <div class="bottom-spacer"></div>
        </main>

        <!-- Bottom Tab Bar -->
        <nav class="tab-bar">
            <div class="tab-bar-inner">
                <!-- Home (active) -->
                <a data-dom-id="nav-home" href="#" class="tab-item" style="color: var(--color-primary);">
                    <span class="tab-emoji">🏠</span>
                    <span>首页</span>
                </a>
                <!-- Daily Check-in -->
                <a data-dom-id="nav-daily-checkin" href="#" class="tab-item" style="color: var(--color-text-tertiary);">
                    <span class="tab-emoji">📋</span>
                    <span>打卡</span>
                </a>
                <!-- Treasure Box -->
                <a data-dom-id="nav-treasure-box" href="#" class="tab-item" style="color: var(--color-text-tertiary);">
                    <span class="tab-emoji">🎁</span>
                    <span>宝箱</span>
                </a>
                <!-- Rewards -->
                <a data-dom-id="nav-my-rewards" href="#" class="tab-item" style="color: var(--color-text-tertiary);">
                    <span class="tab-emoji">🏆</span>
                    <span>奖励</span>
                </a>
            </div>
            <!-- Safe area for iPhone notch -->
            <div style="height: env(safe-area-inset-bottom, 0px);"></div>
        </nav>
        <button id="switch-user-btn" style="position:fixed;bottom:12px;right:12px;width:36px;height:36px;border-radius:50%;border:none;background:var(--gradient-rainbow);color:#fff;font-size:1rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);z-index:100;display:flex;align-items:center;justify-content:center;" title="切换用户">&#x1F464;</button>
    </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const navMap = {
    'cta-start-today': 'daily-checkin.html',
    'nav-daily-checkin': 'daily-checkin.html',
    'nav-treasure-box': 'treasure-box.html',
    'nav-my-rewards': 'my-rewards.html',
    'nav-home': 'home.html'
  };
  document.querySelectorAll('[data-dom-id]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.preventDefault();
      var target = navMap[el.getAttribute('data-dom-id')];
      if (target) window.location.href = target;
    });
  });

  // Supabase init with login check
  ensureLogin(function(nickname) {
    try {
      DB.initUser().then(function(user) {
        if (user) {
          // Update greeting with nickname
          var greetingEl = document.getElementById('greeting-text');
          if (greetingEl) greetingEl.textContent = '早上好，' + nickname + '！';
          // Update total coins stat card
          if (user.total_coins !== undefined && user.total_coins !== null) {
            var totalCoinsCard = document.getElementById('stat-total-coins');
            if (totalCoinsCard) {
              var valueEl = totalCoinsCard.querySelector('.value');
              if (valueEl) valueEl.textContent = user.total_coins + '枚';
            }
          }
        }
      }).catch(function(e) { console.warn('Supabase init failed:', e); });
    } catch(e) {}
  });

  // Switch user button
  var switchBtn = document.getElementById('switch-user-btn');
  if (switchBtn) {
    switchBtn.addEventListener('click', function() {
      logout();
      ensureLogin(function() { location.reload(); });
    });
  }
});
</script>
</body>
</html>
