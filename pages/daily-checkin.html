<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日打卡</title>
    <style id="theme-vars">
:root {
  /* Brand Colors — Rainbow Candy */
  --color-primary: #FF6B9D;
  --color-primary-light: #FF8FB5;
  --color-primary-dark: #E5507F;
  --color-secondary: #A855F7;
  --color-tertiary: #38BDF8;
  --color-accent-yellow: #FBBF24;
  --color-accent-green: #34D399;
  --color-accent-orange: #FB923C;
  --color-accent-pink: #F472B6;
  --color-bg: #FFF7ED;
  --color-bg-warm: #FFF1F5;
  --color-bg-cool: #EFF6FF;
  --color-surface: #FFFFFF;
  --color-surface-hover: #FFF5F7;
  --color-border: #FDE8EF;
  --color-border-soft: #FCE7F3;
  --color-text: #1F2937;
  --color-text-secondary: #6B7280;
  --color-text-tertiary: #9CA3AF;
  --color-text-inverse: #FFFFFF;
  --state-success: #34D399;
  --state-warning: #FBBF24;
  --state-error: #F87171;
  --state-info: #38BDF8;

  /* Gradient candies */
  --gradient-rainbow: linear-gradient(135deg, #FF6B9D, #A855F7, #38BDF8);
  --gradient-candy: linear-gradient(135deg, #F472B6, #FB923C);
  --gradient-sunset: linear-gradient(135deg, #FBBF24, #FF6B9D);
  --gradient-ocean: linear-gradient(135deg, #38BDF8, #34D399);
  --gradient-purple: linear-gradient(135deg, #A855F7, #F472B6);

  /* Typography */
  --font-family-title: "ZCOOL KuaiLe", "Noto Sans SC", system-ui, sans-serif;
  --font-family-body: "Noto Sans SC", system-ui, -apple-system, sans-serif;
  --font-size-display: 2.5rem;
  --font-size-h1: 2rem;
  --font-size-h2: 1.5rem;
  --font-size-h3: 1.25rem;
  --font-size-body: 1rem;
  --font-size-small: 0.875rem;
  --font-size-xs: 0.75rem;
  --font-weight-title: 700;
  --font-weight-body: 400;
  --font-weight-medium: 500;
  --line-height-heading: 1.3;
  --line-height-body: 1.6;

  /* Spacing */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 32px;
  --spacing-2xl: 48px;

  /* Radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;

  /* Shadow */
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.04);
  --shadow-card: 0 4px 16px rgba(255,107,157,0.08);
  --shadow-float: 0 8px 24px rgba(168,85,247,0.12);

  /* Brand prefix */
  --brand-prefix: sc;
}

/* Dark mode is not needed for this children's app */

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="../db.js"></script>
    <style>
        /* === Reset & Base === */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: var(--color-bg);
            font-family: var(--font-family-body);
            color: var(--color-text);
            line-height: var(--line-height-body);
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            border: none;
            background: none;
            font-family: inherit;
        }

        /* === Main Layout === */
        .main-content {
            margin: 0 auto;
            max-width: 768px;
            position: relative;
            padding-bottom: 96px;
        }

        /* === Sticky Header === */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: white;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            padding: var(--spacing-md) 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-card);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        .header-date-emoji {
            font-size: 1.25rem;
        }
        .header-date-text {
            font-size: 1rem;
            font-weight: var(--font-weight-title);
            color: var(--color-text);
            font-family: var(--font-family-title);
        }
        .header-coin-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: var(--radius-full);
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-title);
            background: linear-gradient(135deg, #FBBF24, #F59E0B);
            color: #78350F;
        }

        /* === Task Cards Section === */
        .tasks-section {
            padding: var(--spacing-md) var(--spacing-md) 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* === Task Card (shared) === */
        .task-card {
            border-radius: var(--radius-md);
            padding: 14px var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            position: relative;
            overflow: hidden;
        }

        /* Completed task card */
        .task-card.completed {
            background: #ECFDF5;
            box-shadow: var(--shadow-sm);
            border-left: 4px solid var(--color-accent-green);
        }

        /* Pending task card */
        .task-card.pending {
            background: var(--color-surface);
            box-shadow: var(--shadow-card);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .task-card.pending:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-float);
        }

        /* Check circle (shared) */
        .check-circle {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .task-card.completed .check-circle {
            background: var(--gradient-candy);
        }
        .task-card.pending .check-circle {
            border: 2px solid var(--color-text-tertiary);
            background: transparent;
            animation: gentlePulse 2s ease-in-out infinite;
        }

        /* Task info area */
        .task-info {
            flex: 1;
            min-width: 0;
        }
        .task-name-row {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        .task-emoji {
            font-size: 1.125rem;
        }
        .task-name {
            font-weight: var(--font-weight-title);
            font-size: var(--font-size-small);
            font-family: var(--font-family-title);
        }
        .task-card.completed .task-name {
            text-decoration: line-through;
            opacity: 0.6;
            color: var(--color-text-secondary);
        }
        .task-card.pending .task-name {
            color: var(--color-text);
        }

        /* Task right badges */
        .task-badges {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            flex-shrink: 0;
        }
        .badge-completed {
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-title);
            padding: 2px 8px;
            border-radius: var(--radius-full);
            background: #D1FAE5;
            color: #065F46;
        }
        .badge-coins {
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-title);
            color: var(--color-accent-yellow);
        }

        /* === Summary Section === */
        .summary-section {
            margin: 20px var(--spacing-md) 0;
            padding: var(--spacing-md);
            border-radius: var(--radius-lg);
            background: white;
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
        }
        .summary-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .summary-title {
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-title);
            color: var(--color-text);
            font-family: var(--font-family-title);
        }
        .summary-emoji {
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-title);
            color: var(--color-primary);
        }
        .progress-bar-track {
            width: 100%;
            height: 12px;
            border-radius: var(--radius-full);
            overflow: hidden;
            background: var(--color-border-soft);
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: var(--radius-full);
            width: 33.33%;
            background: var(--gradient-rainbow);
        }
        .summary-footer {
            margin-top: 10px;
            text-align: center;
        }
        .summary-coins-text {
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-title);
            color: var(--color-accent-orange);
        }
        .summary-celebration {
            margin-left: var(--spacing-sm);
        }

        /* === Bottom Tab Bar === */
        .bottom-tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 768px;
            background: white;
            z-index: 50;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
        }
        .tab-bar-inner {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: var(--spacing-sm) var(--spacing-sm);
            padding-bottom: max(0.5rem, env(safe-area-inset-bottom));
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: var(--spacing-sm) var(--spacing-md);
        }
        .tab-emoji {
            font-size: 1.25rem;
        }
        .tab-label {
            font-size: 10px;
            font-weight: var(--font-weight-medium);
        }
        .tab-label-active {
            font-size: 10px;
            font-weight: var(--font-weight-title);
        }
        .tab-indicator {
            width: 4px;
            height: 4px;
            border-radius: var(--radius-full);
            margin-top: 2px;
            background: var(--color-primary);
        }

        /* === Bottom spacer === */
        .bottom-spacer {
            height: var(--spacing-md);
        }

        /* === Animations === */
        @keyframes gentlePulse {
            0%, 100% {
                transform: scale(1);
                border-color: var(--color-text-tertiary);
            }
            50% {
                transform: scale(1.08);
                border-color: var(--color-primary-light);
            }
        }
        @keyframes celebrateBounce {
            0% { transform: scale(1); }
            30% { transform: scale(1.15); }
            50% { transform: scale(0.95); }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .task-card.just-completed {
            animation: celebrateBounce 0.5s ease-out;
        }

        /* Sparkle effect on completed check circle */
        .task-card.completed .check-circle {
            position: relative;
        }
        .task-card.completed .check-circle::after {
            content: '✨';
            position: absolute;
            top: -6px;
            right: -6px;
            font-size: 10px;
            animation: sparkle 1.5s ease-in-out infinite;
        }
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .cal-header { font-size: var(--font-size-xs); color: var(--color-text-tertiary); padding: 6px 0; font-weight: var(--font-weight-medium); }
        .cal-day { font-size: var(--font-size-small); padding: 8px 0; border-radius: var(--radius-sm); cursor: pointer; position: relative; color: var(--color-text); font-family: var(--font-family-body); transition: background 0.2s; }
        .cal-day:hover { background: var(--color-bg); }
        .cal-day.today { background: var(--color-primary); color: var(--color-text-inverse); font-weight: var(--font-weight-title); }
        .cal-day.other-month { color: var(--color-text-tertiary); opacity: 0.4; }
        .cal-day .dot { position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; border-radius: 50%; }
        .cal-day .dot.full { background: var(--state-success); }
        .cal-day .dot.partial { background: var(--state-warning); }
        .cal-day .dot.empty { background: var(--color-border); }
        .cal-tooltip { position: fixed; z-index: 200; background: var(--color-text); color: var(--color-text-inverse); padding: 8px 12px; border-radius: var(--radius-md); font-size: var(--font-size-xs); font-family: var(--font-family-body); pointer-events: none; opacity: 0; transition: opacity 0.2s; white-space: nowrap; }
    .cal-tooltip.show { opacity: 1; }
    #cal-detail-overlay.active { display:flex !important; }
    #cal-detail-panel { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .cal-detail-task { display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-md);margin-bottom:6px;background:var(--color-bg); }
    .cal-detail-task.done { background:var(--color-bg-warm); }
    .cal-detail-task .task-emoji { font-size:1.25rem; }
    .cal-detail-task .task-name { flex:1;font-size:var(--font-size-body);color:var(--color-text);font-family:var(--font-family-body); }
    .cal-detail-task .task-status { font-size:var(--font-size-xs);font-weight:var(--font-weight-medium);border-radius:var(--radius-full);padding:2px 10px; }
    .cal-detail-task.done .task-status { background:var(--state-success);color:#fff; }
    .cal-detail-task.not-done .task-status { background:var(--color-border);color:var(--color-text-tertiary); }
    .cal-detail-coins { font-size:var(--font-size-small);color:var(--color-text-secondary);margin-top:8px;padding:8px 12px;background:var(--color-bg);border-radius:var(--radius-md);text-align:center; }
    .cal-retro-btn { width:100%;padding:14px;border:none;border-radius:var(--radius-md);font-size:var(--font-size-body);font-weight:var(--font-weight-title);color:#fff;background:var(--gradient-rainbow);cursor:pointer;font-family:var(--font-family-title);margin-top:12px; }
    .cal-retro-btn:disabled { background:#D1D5DB;cursor:not-allowed; }
    </style>
</head>

        <span class="tab-label">首页</span>
      </a>
      <!-- Tab: 打卡 (active) -->
      <a data-dom-id="nav-daily-checkin" href="#" class="tab-item" style="color: var(--color-primary);">
        <span class="tab-emoji">📋</span>
        <span class="tab-label-active">打卡</span>
        <div class="tab-indicator"></div>
      </a>
      <!-- Tab: 宝箱 -->
      <a data-dom-id="nav-treasure-box" href="#" class="tab-item" style="color: var(--color-text-tertiary);">
        <span class="tab-emoji">🎁</span>
        <span class="tab-label">宝箱</span>
      </a>
      <!-- Tab: 奖励 -->
      <a data-dom-id="nav-my-rewards" href="#" class="tab-item" style="color: var(--color-text-tertiary);">
        <span class="tab-emoji">🏆</span>
        <span class="tab-label">奖励</span>
      </a>
    </div>
  </nav>
<button id="switch-user-btn" style="position:fixed;bottom:12px;right:12px;width:36px;height:36px;border-radius:50%;border:none;background:var(--gradient-rainbow);color:#fff;font-size:1rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15);z-index:100;display:flex;align-items:center;justify-content:center;" title="切换用户">&#x1F464;</button>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var navMap = {
    'nav-home': 'home.html',
    'nav-daily-checkin': 'daily-checkin.html',
    'nav-treasure-box': 'treasure-box.html',
    'nav-my-rewards': 'my-rewards.html'
  };
  document.querySelectorAll('[data-dom-id]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      var target = navMap[el.getAttribute('data-dom-id')];
      if (target) window.location.href = target;
    });
  });

  // Set current date
  var dateEl = document.getElementById('header-date');
  if (dateEl) {
    var now = new Date();
    var weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    dateEl.textContent = (now.getMonth()+1) + '月' + now.getDate() + '日 ' + weekdays[now.getDay()];
  }

  var coinCount = 0;
  var completedCount = 0;
  var totalTasks = 9;
  var allCheckinData = {};

  function getTodayKey() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  // ===== Supabase Initialization (wrapped in ensureLogin) =====
  ensureLogin(function(nickname) {
    try {
      DB.initUser().then(function(user) {
        if (user && user.total_coins !== undefined && user.total_coins !== null) {
          coinCount = user.total_coins;
          var headerCoin = document.querySelector('.header-coin-badge');
          if (headerCoin) headerCoin.innerHTML = '<span>💰</span><span>' + coinCount + '枚</span>';
        }
        var todayKey = getTodayKey();
        return DB.getCheckin(todayKey);
      }).then(function(checkin) {
        if (checkin && checkin.completed_tasks) {
          // Restore task completion states from Supabase
          completedCount = checkin.completed_count || 0;
          coinCount = checkin.coins_earned || 0;
          var cards = document.querySelectorAll('.task-card');
          cards.forEach(function(card, i) {
            if (checkin.completed_tasks.indexOf(i) !== -1) {
              card.classList.remove('pending');
              card.classList.add('completed');
              var circle = card.querySelector('.check-circle');
              circle.style.border = 'none';
              circle.style.background = 'linear-gradient(135deg, #F472B6, #FB923C)';
              circle.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
              var badges = card.querySelector('.task-badges');
              var coinSpan = badges.querySelector('.badge-coins');
              if (coinSpan) coinSpan.remove();
              var doneSpan = document.createElement('span');
              doneSpan.className = 'badge-completed';
              doneSpan.textContent = '已完成';
              badges.appendChild(doneSpan);
            }
          });
          // Update summary
          var summaryTitle = document.querySelector('.summary-title');
          if (summaryTitle) summaryTitle.textContent = '今日进度: ' + completedCount + '/' + totalTasks + ' 已完成';
          var progressFill = document.querySelector('.progress-bar-fill');
          if (progressFill) progressFill.style.width = (completedCount / totalTasks * 100) + '%';
          var coinsText = document.querySelector('.summary-coins-text');
          if (coinsText) coinsText.textContent = '已获得 ' + coinCount + '枚 金币!';
          var headerCoin = document.querySelector('.header-coin-badge');
          if (headerCoin) headerCoin.innerHTML = '<span>💰</span><span>' + coinCount + '枚</span>';
        }
        // Load all checkin data for calendar
        return DB.getAllCheckins();
      }).then(function(checkins) {
        if (checkins && checkins.length > 0) {
          checkins.forEach(function(c) {
            allCheckinData[c.date] = { completed: c.completed_count, total: c.total_count, tasks: c.completed_tasks || [], coins: c.coins_earned || 0 };
          });
        }
        renderCalendar();
      }).catch(function(err) {
        console.warn('Supabase init error, using local state:', err);
        renderCalendar();
      });
    } catch(e) {
      console.warn('Supabase not available, using local state:', e);
      renderCalendar();
    }
  });

  // Make task cards clickable for toggle effect
  document.querySelectorAll('.task-card').forEach(function(card) {
    card.addEventListener('click', function(e) {
      if (e.target.closest('[data-dom-id]')) return;

      var isCompleted = card.classList.contains('completed');
      var circle = card.querySelector('.check-circle');
      var badges = card.querySelector('.task-badges');
      var coinReward = card.getAttribute('data-coins') ? parseInt(card.getAttribute('data-coins')) : 0;
      if (!coinReward) {
        var coinText = card.querySelector('.badge-coins');
        if (coinText) coinReward = parseInt(coinText.textContent) || 0;
      }

      if (isCompleted) {
        // Un-complete: completed -> pending
        card.classList.remove('completed', 'just-completed');
        card.classList.add('pending');
        circle.innerHTML = '';
        circle.style.border = '2px solid var(--color-text-tertiary)';
        circle.style.background = 'transparent';
        if (badges) {
          var completedBadge = badges.querySelector('.badge-completed');
          if (completedBadge) completedBadge.remove();
          var existingCoins = badges.querySelectorAll('.badge-coins');
          existingCoins.forEach(function(c) { c.remove(); });
          var coinSpan = document.createElement('span');
          coinSpan.className = 'badge-coins';
          coinSpan.textContent = '+' + (coinReward || 2) + '枚 💰';
          badges.appendChild(coinSpan);
        }
        completedCount--;
        coinCount -= (coinReward || 2);
      } else {
        // Complete: pending -> completed
        card.classList.remove('pending');
        card.classList.add('completed', 'just-completed');
        circle.style.border = 'none';
        circle.style.background = 'linear-gradient(135deg, #F472B6, #FB923C)';
        circle.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        // Remove animation class after it finishes
        setTimeout(function() { card.classList.remove('just-completed'); }, 500);
        if (badges) {
          var coinSpan2 = badges.querySelector('.badge-coins');
          if (coinSpan2) coinSpan2.remove();
          var doneSpan = document.createElement('span');
          doneSpan.className = 'badge-completed';
          doneSpan.textContent = '已完成';
          badges.appendChild(doneSpan);
        }
        completedCount++;
        coinCount += (coinReward || 2);
      }

      // Update summary
      var summaryTitle = document.querySelector('.summary-title');
      if (summaryTitle) summaryTitle.textContent = '今日进度: ' + completedCount + '/' + totalTasks + ' 已完成';
      var progressFill = document.querySelector('.progress-bar-fill');
      if (progressFill) progressFill.style.width = (completedCount / totalTasks * 100) + '%';
      var coinsText = document.querySelector('.summary-coins-text');
      if (coinsText) coinsText.textContent = '已获得 ' + coinCount + '枚 金币!';
      // Update header coin badge
      var headerCoin = document.querySelector('.header-coin-badge');
      if (headerCoin) headerCoin.innerHTML = '<span>💰</span><span>' + coinCount + '枚</span>';
      saveTodayCheckin();

      // Save to Supabase (fire-and-forget)
      try {
        var todayKey = getTodayKey();
        var completedIndices = [];
        document.querySelectorAll('.task-card.completed').forEach(function(c) {
          document.querySelectorAll('.task-card').forEach(function(tc, ti) {
            if (tc === c) completedIndices.push(ti);
          });
        });
        DB.saveCheckin(todayKey, completedIndices, completedCount, totalTasks, coinCount);
        DB.updateUser({ total_coins: coinCount });
      } catch(e) {
        console.warn('Supabase save error:', e);
      }
    });
  });

  // ===== Checkin Calendar =====
  var calGrid = document.getElementById('calendar-grid');
  var calTitle = document.getElementById('cal-month-title');
  var calPrev = document.getElementById('cal-prev');
  var calNext = document.getElementById('cal-next');
  var calStreak = document.getElementById('calendar-streak');
  var calTooltip = null;

  // Create tooltip element
  calTooltip = document.createElement('div');
  calTooltip.className = 'cal-tooltip';
  document.body.appendChild(calTooltip);

  var calYear, calMonth;
  var now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();

  function getCheckinData() {
    try {
      var local = JSON.parse(localStorage.getItem('checkin_calendar_data') || '{}');
      // Merge with Supabase cache (Supabase takes priority)
      var merged = {};
      for (var k in local) { if (local.hasOwnProperty(k)) merged[k] = local[k]; }
      for (var k in allCheckinData) { if (allCheckinData.hasOwnProperty(k)) merged[k] = allCheckinData[k]; }
      return merged;
    } catch(e) {
      return allCheckinData || {};
    }
  }
  function saveCheckinData(data) {
    try {
      localStorage.setItem('checkin_calendar_data', JSON.stringify(data));
      // Also update the in-memory cache
      for (var k in data) { if (data.hasOwnProperty(k)) allCheckinData[k] = data[k]; }
    } catch(e) {}
  }
  function calcStreak(data) {
    var streak = 0;
    var d = new Date();
    var todayKey = getTodayKey();
    if (!data[todayKey]) d.setDate(d.getDate() - 1);
    while (true) {
      var key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      if (data[key] && data[key].completed > 0) {
        streak++;
        d.setDate(d.getDate() - 1);
      } else break;
      if (streak > 365) break;
    }
    return streak;
  }

  function renderCalendar() {
    calGrid.innerHTML = '';
    calTitle.textContent = calYear + '年' + (calMonth + 1) + '月';
    var data = getCheckinData();
    var streak = calcStreak(data);
    calStreak.textContent = '连续打卡 ' + streak + ' 天';

    var dayNames = ['日','一','二','三','四','五','六'];
    dayNames.forEach(function(name) {
      var h = document.createElement('div');
      h.className = 'cal-header';
      h.textContent = name;
      calGrid.appendChild(h);
    });

    var firstDay = new Date(calYear, calMonth, 1).getDay();
    var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    var prevMonthDays = new Date(calYear, calMonth, 0).getDate();

    var todayKey = getTodayKey();
    var todayDate = new Date();

    for (var i = firstDay - 1; i >= 0; i--) {
      var cell = document.createElement('div');
      cell.className = 'cal-day other-month';
      cell.textContent = prevMonthDays - i;
      calGrid.appendChild(cell);
    }

    for (var d = 1; d <= daysInMonth; d++) {
      var cell = document.createElement('div');
      cell.className = 'cal-day';
      cell.textContent = d;

      var dateKey = calYear + '-' + String(calMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      if (dateKey === todayKey) cell.classList.add('today');

      var dayDate = new Date(calYear, calMonth, d);
      if (dayDate <= todayDate) {
        var dot = document.createElement('div');
        dot.className = 'dot';
        var dayData = data[dateKey];
        if (dayData && dayData.completed === dayData.total) dot.classList.add('full');
        else if (dayData && dayData.completed > 0) dot.classList.add('partial');
        else dot.classList.add('empty');
        cell.appendChild(dot);

        if (dayData || dayDate <= todayDate) {
          (function(key, dd) {
            cell.style.cursor = 'pointer';
            cell.addEventListener('click', function(e) {
              e.stopPropagation();
              showDayDetail(key, dd);
            });
          })(dateKey, dayDate);
        }
      }

      calGrid.appendChild(cell);
    }

    var totalCells = firstDay + daysInMonth;
    var remaining = (7 - totalCells % 7) % 7;
    for (var i = 1; i <= remaining; i++) {
      var cell = document.createElement('div');
      cell.className = 'cal-day other-month';
      cell.textContent = i;
      calGrid.appendChild(cell);
    }
  }

  if (calPrev) calPrev.addEventListener('click', function() {
    calMonth--;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
  });
  if (calNext) calNext.addEventListener('click', function() {
    calMonth++;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
  });

  function showDayDetail(dateKey, dateObj) {
    var overlay = document.getElementById('cal-detail-overlay');
    var title = document.getElementById('cal-detail-title');
    var content = document.getElementById('cal-detail-content');
    var actions = document.getElementById('cal-detail-actions');

    var weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    title.textContent = (dateObj.getMonth()+1) + '月' + dateObj.getDate() + '日 ' + weekdays[dateObj.getDay()];

    var taskNames = [
      {emoji:'📖', name:'早读·语文'}, {emoji:'🔤', name:'早读·英语'}, {emoji:'✍️', name:'练字'},
      {emoji:'🧮', name:'口算'}, {emoji:'📚', name:'课外阅读'}, {emoji:'📝', name:'读书笔记'},
      {emoji:'📖', name:'阅读题练习'}, {emoji:'✏️', name:'作文'}, {emoji:'🔤', name:'看拼音写词语'}
    ];
    var taskCoins = [2, 2, 2, 3, 2, 3, 2, 3, 2];

    var data = getCheckinData();
    var dayData = data[dateKey];
    var completedIndices = dayData ? (dayData.tasks || []) : [];

    content.innerHTML = '';
    var totalCoinsForDay = 0;
    taskNames.forEach(function(task, i) {
      var isDone = completedIndices.indexOf(i) !== -1;
      var div = document.createElement('div');
      div.className = 'cal-detail-task' + (isDone ? ' done' : ' not-done');
      div.innerHTML = '<span class="task-emoji">' + task.emoji + '</span>'
        + '<span class="task-name">' + task.name + '</span>'
        + '<span class="task-status">' + (isDone ? '已完成' : '未完成') + '</span>';
      content.appendChild(div);
      if (isDone) totalCoinsForDay += taskCoins[i];
    });

    var coinsDiv = document.createElement('div');
    coinsDiv.className = 'cal-detail-coins';
    coinsDiv.textContent = dayData ? ('获得 ' + (dayData.coins || totalCoinsForDay) + ' 枚金币 · 完成 ' + completedIndices.length + '/' + 9 + ' 项') : '当天无打卡记录';
    content.appendChild(coinsDiv);

    // Retroactive checkin button (only for past days, not today)
    var todayKey = getTodayKey();
    actions.innerHTML = '';
    if (dateKey !== todayKey && dateObj <= new Date()) {
      var retroBtn = document.createElement('button');
      retroBtn.className = 'cal-retro-btn';
      retroBtn.textContent = dayData && dayData.completed > 0 ? '修改打卡' : '补打卡';
      retroBtn.addEventListener('click', function() {
        overlay.classList.remove('active');
        openRetroCheckin(dateKey, dateObj, taskNames, taskCoins);
      });
      actions.appendChild(retroBtn);
    }

    overlay.classList.add('active');
  }

  // Close detail panel
  document.getElementById('cal-detail-close').addEventListener('click', function() {
    document.getElementById('cal-detail-overlay').classList.remove('active');
  });
  document.getElementById('cal-detail-overlay').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('active');
  });

  function openRetroCheckin(dateKey, dateObj, taskNames, taskCoins) {
    // Create modal
    var existing = document.getElementById('retro-modal');
    if (existing) existing.remove();

    var modal = document.createElement('div');
    modal.id = 'retro-modal';
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:600;display:flex;align-items:center;justify-content:center;';

    var card = document.createElement('div');
    card.style.cssText = 'background:#fff;border-radius:20px;padding:28px 24px;width:360px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);';

    var weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    card.innerHTML = '<h3 style="margin:0 0 4px;font-size:var(--font-size-h3);font-family:var(--font-family-title);color:var(--color-text);">补打卡</h3>'
      + '<p style="margin:0 0 16px;font-size:var(--font-size-small);color:var(--color-text-tertiary);">' + (dateObj.getMonth()+1) + '月' + dateObj.getDate() + '日 ' + weekdays[dateObj.getDay()] + '</p>'
      + '<div id="retro-tasks"></div>'
      + '<div style="display:flex;gap:8px;margin-top:16px;">'
      + '<button id="retro-cancel" style="flex:1;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-md);background:#fff;cursor:pointer;font-family:var(--font-family-body);font-size:var(--font-size-body);color:var(--color-text-secondary);">取消</button>'
      + '<button id="retro-save" style="flex:1;padding:12px;border:none;border-radius:var(--radius-md);background:var(--gradient-rainbow);color:#fff;cursor:pointer;font-family:var(--font-family-title);font-size:var(--font-size-body);">保存</button>'
      + '</div>';

    modal.appendChild(card);
    document.body.appendChild(modal);

    // Load existing data for this date
    var data = getCheckinData();
    var dayData = data[dateKey];
    var existingTasks = dayData && dayData.tasks ? dayData.tasks.slice() : [];

    function renderRetroTasks() {
      var retroTasks = document.getElementById('retro-tasks');
      retroTasks.innerHTML = '';
      taskNames.forEach(function(task, i) {
        var isChecked = existingTasks.indexOf(i) !== -1;
        var row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--radius-sm);margin-bottom:4px;cursor:pointer;transition:background 0.15s;' + (isChecked ? 'background:var(--color-bg-warm);' : '');
        row.innerHTML = '<div style="width:24px;height:24px;border-radius:50%;border:2px solid ' + (isChecked ? '#34D399' : 'var(--color-border)') + ';display:flex;align-items:center;justify-content:center;background:' + (isChecked ? '#34D399' : 'transparent') + ';flex-shrink:0;">' + (isChecked ? '<svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' : '') + '</div>'
          + '<span style="font-size:1.1rem;">' + task.emoji + '</span>'
          + '<span style="flex:1;font-size:var(--font-size-body);color:var(--color-text);font-family:var(--font-family-body);">' + task.name + '</span>'
          + '<span style="font-size:var(--font-size-xs);color:var(--color-accent-orange);">+' + taskCoins[i] + '💰</span>';
        row.addEventListener('click', function() {
          var idx = taskNames.indexOf(task);
          var pos = existingTasks.indexOf(idx);
          if (pos !== -1) existingTasks.splice(pos, 1);
          else existingTasks.push(idx);
          renderRetroTasks();
        });
        retroTasks.appendChild(row);
      });
    }
    renderRetroTasks();

    // Cancel
    document.getElementById('retro-cancel').addEventListener('click', function() { modal.remove(); });
    modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });

    // Save
    document.getElementById('retro-save').addEventListener('click', function() {
      var coins = 0;
      existingTasks.forEach(function(idx) { coins += taskCoins[idx]; });
      var newData = getCheckinData();
      newData[dateKey] = { completed: existingTasks.length, total: 9, tasks: existingTasks.slice(), coins: coins };
      saveCheckinData(newData);

      // Save to Supabase
      try {
        DB.saveCheckin(dateKey, existingTasks, existingTasks.length, 9, coins);
      } catch(e) {}

      modal.remove();
      renderCalendar();
    });
  }

  function saveTodayCheckin() {
    var data = getCheckinData();
    var key = getTodayKey();
    var currentCompleted = document.querySelectorAll('.task-card.completed').length;
    data[key] = { completed: currentCompleted, total: totalTasks };
    saveCheckinData(data);
    // Supabase save is handled in the task click handler above
    renderCalendar();
  }

  // Switch user button
  var switchBtn = document.getElementById('switch-user-btn');
  if (switchBtn) {
    switchBtn.addEventListener('click', function() {
      if (confirm('确定要切换用户吗？当前数据已自动保存。')) {
        logout();
        ensureLogin(function() { location.reload(); });
      }
    });
  }
});
</script>

</body>
</html>
